<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleX | Insights & Blogs</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="#" aria-label="ScaleX home">
            <img src="./images/scalexLogo.png" alt="">
            <span>ScaleX</span>
        </a>

        <nav class="main-nav" aria-label="Primary navigation">
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Blogs</a>
            <a href="#">Contact Us</a>
        </nav>

        <a class="cta" href="#">Get Started</a>
    </header>

    <main class="page">
        <h1>Insights &amp; Blogs</h1>

        <div class="filters" aria-label="Blog categories">
            <button class="active" type="button">All</button>
            <button type="button">Tech</button>
            <button type="button">SaaS</button>
            <button type="button">Marketing</button>
        </div>

        <section class="blog-grid" aria-label="Featured blogs">
            <article class="blog-card">
                <div class="card-image image-one" role="img" aria-label="A martini glass in front of red tiles"></div>
                <div class="card-body">
                    <span class="tag">Tech</span>
                    <h2>The Ultimate Guide To SaaS Marketing</h2>
                    <time datetime="2025-05-23">May 23, 2025</time>
                </div>
            </article>

            <article class="blog-card">
                <div class="card-image image-two" role="img" aria-label="A chair against an orange background"></div>
                <div class="card-body">
                    <span class="tag">SaaS</span>
                    <h2>5 Key Trends In SaaS Growth For 2025</h2>
                    <time datetime="2025-05-23">May 23, 2025</time>
                </div>
            </article>

            <article class="blog-card">
                <div class="card-image image-three" role="img" aria-label="An orange cat against a red background"></div>
                <div class="card-body">
                    <span class="tag">Marketing</span>
                    <h2>How Data-Driven Strategies Are Important</h2>
                    <time datetime="2025-05-23">May 23, 2025</time>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
